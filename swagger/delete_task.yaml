summary: "Delete a task by ID"
description: "Remove a specific task from the system using its unique identifier."
parameters:
  - name: "task_id"
    in: "path"
    type: "integer"
    required: true
    description: "The ID of the task to delete."
responses:
  200:
    description: "Task deleted successfully."
    schema:
      type: "object"
      properties:
        message:
          type: "string"
          example: "Task 1 deleted"
  404:
    description: "Task not found."
